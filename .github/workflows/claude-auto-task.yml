# 🤖 Claude Auto Task Runner (auto-generated by oversight backend)
#
# این فایل خودکار توسط پنل oversight روی این ریپو نصب شده است.
# هرگاه تسکی به فولدر prompt/ این ریپو push شود (توسط backend sync یا
# دستی)، GitHub Actions این workflow را trigger می‌کند و Claude Code
# تسک‌های pending را به ترتیب اولویت اجرا می‌کند.
#
# برای غیرفعال کردن: از پنل oversight روی این پروژه، toggle «اجرای
# خودکار با Claude Code» را خاموش کنید — این فایل خودکار حذف می‌شود.
# (یا این فایل را manually delete کنید.)

name: Claude Auto Task Runner

# 'on' را به‌صورت string quote می‌کنیم چون در YAML 1.1، on/off/yes/no
# مقدار boolean هستند. GitHub Actions هر دو فرم را می‌پذیرد ولی این
# فرم با همهٔ YAML parserها سازگار است.
"on":
  # claude-code-action@v1 روی push event کار نمی‌کند
  # ("Unsupported event type: push"). فقط workflow_dispatch پشتیبانی
  # می‌شود. backend پس از push شدن تسک به prompt/_index.json، خودکار
  # workflow را با GitHub API trigger می‌زند (dispatches endpoint).
  workflow_dispatch: {}

# 🛡 (concurrency strategy) — cancel-in-progress: false
# قبلاً true بود ولی یافتیم که runهای در حال اجرا را مید-اجرا cancel
# می‌کرد (Run #10 بعد از ۳ دقیقه اجرای واقعی، توسط Run #11 قطع شد).
#
# با false:
#   - in-progress run ادامه می‌دهد تا کاملاً تمام شود (Claude زمان دارد)
#   - queued runs اگر newer بیاید، جایگزین می‌شوند (فقط آخرین queued می‌ماند)
#
# combined با debounce 60s در backend و content-diff check، تعداد trigger
# های بی‌فایده به حداقل می‌رسد، پس setup-then-cancel نخواهیم داشت.
concurrency:
  group: claude-auto-task-6b04f8bd-b562-4fb9-9cd9-0c27458ced59
  cancel-in-progress: false

jobs:
  run-task:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write       # برای commit + push به main
      pull-requests: write  # ذخیره برای آینده (الان استفاده نمی‌کنیم)
      id-token: write       # احیاناً برای OIDC در آینده
    steps:
      - name: Checkout (full history برای push کردن)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # token پیش‌فرض ACTIONS_GITHUB_TOKEN است — برای push کفایت می‌کند.
          # برای جلوگیری از infinite loop، commit messages ما حاوی
          # [skip ci] خواهد بود تا re-trigger نشوند.

      - name: Run Claude Code (headless)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 30 --model claude-opus-4-8 --dangerously-skip-permissions"
          prompt: |
            این پرامپت را کامل بخوان (نه skim). به شاخه main برو. از endpoint $OVERSIGHT_BACKEND_URL/api/external/prompts/next?watched_id=$WATCHED_ID (header X-External-Token: $OVERSIGHT_EXTERNAL_TOKEN) لیست تسک‌های pending را به ترتیب اولویت بگیر.
            
            اگر لیست خالی برگشت یا API در دسترس نبود: یک خط log بنویس 'no pending tasks — exiting cleanly' و کار را با success تمام کن. هیچ تسک خیالی نساز، هیچ commit نزن.
            
            برای هر تسک:
            
            1) endpoint POST /api/external/prompts/{task_id}/claim با body {"agent":"claude-code-action"} لاک تسک را بگیر. اگر 409 خوردی، تسک قبلاً توسط دیگری claim شده — رد شو به تسک بعدی.
            
            2) فایل prompt/<task_id>.md را cat کامل (نه head/tail/--lines/sed) بخوان. wc -l + grep -c '^##' بزن آمار خط/section بنویس. لیست همه section header ها را نشان بده. اگر > 500 خط، warning بنویس. Prompt + همه AC + همه Step را عیناً quote کن (بدون '...' یا 'etc'). AC_count اعلام = paste شده.
            
            3) iteration کامل: بررسی → پیاده‌سازی → commit → push origin main فوری (rejected → pull --rebase → push دوباره). هرگز batch نکن، هرگز branch جدا نکن، هرگز push تأخیری.
            
            4) برای هر AC: پیاده‌سازی، تست، diff (اگر خالی برگرد)، self-verify per AC، re-read + coverage report per section (✓/✗) — اگر < 100% برگرد. commit message: task_id + Prompt stats + Coverage.
            
            5) endpoint POST /api/external/prompts/{task_id}/complete با body {"summary":"<خلاصه کار انجام‌شده>","commit_sha":"<sha>"} تسک را به‌عنوان done اعلام کن. اگر شکست خوردی، POST /fail با reason.
            
            🚨 قاعدهٔ ضد-فرار TO-DO: TO-DO فقط برای موارد واقعاً غیرممکن انسانی — credential کاربر، account/billing روی سرویس خارجی، داده‌ی خصوصی کاربر، تصمیم سلیقه‌ای/حقوقی/کسب‌وکار. هرگز TO-DO برای: UI component (.tsx/.jsx)، endpoint، model، migration، test، docs، Celery، scheduler، integration با Google/Stripe (با stub بساز)، 'feature بزرگه'، '.tsx بود ولی repo .jsx است' (از .jsx استفاده کن)، 'نیازمند فیلد X' (اضافه کن). قبل از TO-DO ۴ سؤال بپرس: می‌تونم stub بسازم؟ test بنویسم؟ abstraction تعریف کنم؟ فقط یه decision کاربر مونده؟ اگه بله → بساز و TO-DO نکن. اگه > 20% تسک‌ها TO-DO شد، خودت در گزارش پایانی اعلام کن 'من فرار کردم، کاربر بازبینی کند'.
            
            هرگز batching commit، هرگز skim section های وسط، هرگز 'section مشابه قبلی' فرض کن، هرگز '...' در quote، هرگز 'already done' بدون اثبات، هرگز defer/skip، هرگز 'no-op تأییدی' برای تسک‌های آخر؛ گزارش نهایی شامل commits == pushes، Coverage کلی، لیست TO-DO ها با اعلام نسبت آن. هیچ‌گاه merge یا PR نزن — مستقیم به main commit و push کن.
        env:
          OVERSIGHT_BACKEND_URL: ${{ secrets.OVERSIGHT_BACKEND_URL }}
          OVERSIGHT_EXTERNAL_TOKEN: ${{ secrets.OVERSIGHT_EXTERNAL_TOKEN }}
          WATCHED_ID: "6b04f8bd-b562-4fb9-9cd9-0c27458ced59"
          REPO_FULL_NAME: "mahdighandi1989/language"
