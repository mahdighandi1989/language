# Continuous Integration — CI/CD dependency check, npm audit, and tests.
#
# نصب: این فایل را به `.github/workflows/ci.yml` کپی کنید. (به‌صورت example در
# docs/ نگه‌داری می‌شود چون توکن اتوماسیون این ریپو مجوز `workflows` برای نوشتن
# مستقیم زیر .github/workflows/ را ندارد؛ یک maintainer با مجوز کافی باید آن را
# نصب کند.) همان بررسی‌ها بدون GitHub Actions نیز از طریق npm scripts قابل اجرا
# هستند: `npm run deps:check` و `npm run audit` (به package.json ریشه نگاه کنید).
#
# این فایل مرحلهٔ بررسی وابستگی‌ها (dependency check) را به CI/CD اضافه می‌کند:
# `npm ci` فایل package-lock.json را در برابر package.json اعتبارسنجی می‌کند و
# `npm audit` به‌صورت منظم آسیب‌پذیری‌ها را شناسایی می‌کند.
#
# هدف خروجی (measurable): «کاهش خطاهای ناشی از ناسازگاری وابستگی‌ها به صفر».
# این workflow آن را به یک سیگنال قابل اندازه‌گیری تبدیل می‌کند:
#   - `npm ci` (dependency check): اگر package.json و package-lock.json از هم
#     فاصله بگیرند شکست می‌خورد، پس lock file همیشه با manifestها همگام می‌ماند.
#   - `npm audit`: تعداد آسیب‌پذیری‌های critical رسیدگی‌نشده را پایش می‌کند.
#   - test E2E سازگاری وابستگی‌ها (tests/test_dependency_consistency.py) که
#     outcome_rate را اندازه می‌گیرد و باید ۱۰۰٪ باشد.
# جزئیات کامل: docs/dependency_consistency.md و docs/outcome_target.md.

name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # اجرای منظم npm audit حتی بدون تغییر کد، تا آسیب‌پذیری‌های تازه‌منتشرشده
  # در وابستگی‌های موجود زود شناسایی شوند (هر دوشنبه ساعت 06:00 UTC).
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependencies:
    name: Dependency check & npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # dependency check: npm ci نصب را دقیقاً از package-lock.json انجام می‌دهد
      # و اگر lock file با package.json همگام نباشد با خطا متوقف می‌شود.
      - name: Install dependencies (npm ci — lockfile consistency check)
        run: npm ci

      # vulnerability scan (npm audit): اجرای منظم برای *شناسایی* آسیب‌پذیری‌ها.
      # این مرحله گزارش‌محور است و build را شکست نمی‌دهد، چون برخی advisoryها در
      # وابستگی‌های transitive/dev هستند که رفعشان نیازمند ارتقای breaking است؛
      # هدف اینجا «دیده‌شدن» آسیب‌پذیری‌هاست نه بلاک‌کردن. گیت سخت سازگاری
      # وابستگی‌ها همان `npm ci` بالا + تست E2E سازگاری است.
      - name: Security audit (npm audit — report vulnerabilities)
        if: always()
        run: npm audit || true

      # گیت اضافه: آسیب‌پذیری‌های critical در وابستگی‌های production نباید
      # رشد کنند. این مرحله فقط گزارش می‌دهد (non-blocking) تا روند ارتقا
      # قابل پیگیری بماند بدون قرمزشدن دائمی CI.
      - name: Production dependency audit (critical, report-only)
        if: always()
        run: npm audit --omit=dev --audit-level=critical || true

  tests:
    name: Tests (frontend unit + dependency-consistency E2E)
    runs-on: ubuntu-latest
    needs: dependencies
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: pip install pytest

      # تست E2E که outcome_rate سازگاری وابستگی‌ها را اندازه می‌گیرد.
      - name: Dependency-consistency E2E outcome test
        run: python -m pytest tests/test_dependency_consistency.py -v

      - name: Frontend unit tests
        run: npm run test --workspace frontend
