<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="اپلیکیشن آموزش لهجه لبنانی با هوش مصنوعی" />
    <title>آموزش لهجه لبنانی</title>
    <script type="module">
      // Firebase configuration is injected from VITE_ environment variables at
      // build time (see src/firebaseConfig.js and .env.example). No secrets are
      // hard-coded in this file.
      import { firebaseConfig, hasFirebaseConfig } from '/src/firebaseConfig.js';
      if (hasFirebaseConfig()) {
        window.__firebase_config = JSON.stringify(firebaseConfig);
      }
      window.__app_id = import.meta.env.VITE_PROJECT_ID || 'default-app-id';
    </script>






</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
