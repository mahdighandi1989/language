services:
  - type: web
    name: lebanese-dialect-app
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      # Frontend Firebase web config. Vite reads these at BUILD time
      # (npm run build) and bakes them into the SPA bundle via import.meta.env.
      # They are NOT secrets (a Firebase web apiKey only identifies the project;
      # access is governed by Firebase Security Rules + API key restrictions),
      # but they are configured here so nothing is hard-coded in source. Set the
      # real values in the Render dashboard (sync:false = enter per-environment).
      - key: VITE_API_KEY
        sync: false
      - key: VITE_AUTH_DOMAIN
        sync: false
      - key: VITE_PROJECT_ID
        sync: false
      - key: VITE_STORAGE_BUCKET
        sync: false
      - key: VITE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_APP_ID
        sync: false
      # Two-way Telegram bot (optional). Set the token in the dashboard to
      # enable; leave unset to keep the bot dormant. See docs/telegram-user-guide.md
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: NODE_ENV
        value: production
