[pytest]
# Repo-level suite lives in tests/. The backend has its own pytest.ini
# (rootdir=backend) so `cd backend && python -m pytest` runs in isolation; we
# scope the root run to tests/ here to avoid collecting both `tests` packages in
# one session (they share a package name).
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
